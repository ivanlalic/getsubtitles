<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>GetSubtitles.Online</title>
  </head>
  <body>
    <form id="form">
      <label for="videoUrl">Video URL:</label>
      <input type="text" id="videoUrl" name="videoUrl" required>
      <button type="submit">Get Subtitles</button>
    </form>


    <button id="myButton">numberToUse</button>
    <p id="myParagraph"></p>

    <button id="getRequest">Get Request</button>
    <p id="finalOutput"></p>

    <a id="downloadLink" href="#" style="display:none">Download SRT</a>

    <script>
// set = to null when real.

      let subtitles = {
    "transcribeDataEndpoint": "http://freesubtitles.ai/api/2199658188",
    "fileTitle": "7454fea5-d084-4aa6-8f19-16a8bae572e1-35c99adb-c158-49cd-81c0-5eb0bf9072ae.mp4",
    "numberToUse": "2199658188",
    "model": "tiny",
    "language": "auto-detect",
    "apiKey": "E4gLjTpp2x",
    "message": "starting-download",
    "translating": false,
    "downloadLink": "https://dotsub-encoded-media-prod.videotms.com/3340704a-9a38-4cdd-bc8d-202b3c2f85bd/35c99adb-c158-49cd-81c0-5eb0bf9072ae/2023-02-17T23:40:18.866841/7454fea5-d084-4aa6-8f19-16a8bae572e1-35c99adb-c158-49cd-81c0-5eb0bf9072ae.mp4"
}; // Initialize global variable to store response

      const form = document.getElementById("form");

      form.addEventListener("submit", (event) => {
        event.preventDefault(); // Prevent form from submitting
        const videoUrl = document.getElementById("videoUrl").value;

        // Make the POST request using the Fetch API

        const asyncPostCall = async () => {
            try {
                const response = await fetch('https://freesubtitles.ai/api', {
                 method: 'POST',
                 headers: {
                   'Content-Type': 'application/json'
                   },
                   body: JSON.stringify({
             // your expected POST request payload goes here

             apiKey: "E4gLjTpp2x",
          model: "tiny",
          language: "auto-detect",
          shouldTranslate: false,
          downloadLink: "https://dotsub-encoded-media-prod.videotms.com/3340704a-9a38-4cdd-bc8d-202b3c2f85bd/35c99adb-c158-49cd-81c0-5eb0bf9072ae/2023-02-17T23:40:18.866841/7454fea5-d084-4aa6-8f19-16a8bae572e1-35c99adb-c158-49cd-81c0-5eb0bf9072ae.mp4"
        
                    })
                 });
                 const data = await response.json();
              // enter you logic when the fetch is successful
                 subtitles = data
                 console.log(subtitles);
               } catch(error) {
             // enter your logic for when there is an error (ex. error toast)

                  console.log(error)
                 } 
            }

asyncPostCall()

      });

// Get references to the button and paragraph elements
var button = document.getElementById("myButton");
      var paragraph = document.getElementById("myParagraph");

      // Add an event listener to the button that displays the subtitles in the paragraph
      button.addEventListener("click", function() {
        paragraph.textContent = JSON.stringify(subtitles.numberToUse);
      });


      //function to get request
      const getRequestButton = document.getElementById("getRequest");

      var paragraph = document.getElementById("finalOutput");

// Add an event listener to the button that triggers the GET request and displays the response
getRequestButton.addEventListener("click", async function() {
  try {
    // Make the GET request and wait for the response
    var response = await fetch('http://freesubtitles.ai/api/5327837534');

    // Convert the response to JSON
    var data = await response.json();

    // Update the paragraph with the response
    paragraph.textContent = JSON.stringify(data.status);
    downloadLink.setAttribute("href", "data:application/octet-stream," + encodeURIComponent(data.srtData));
          downloadLink.setAttribute("download", "sample.srt");
          downloadLink.style.display = "inline";


  } catch (error) {
    // Handle any errors that occur
    paragraph.textContent = 'An error occurred: ' + error.message;
  }
});
      


    </script>
  </body>
</html>
